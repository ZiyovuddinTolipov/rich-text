<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@tolipovjs/rich-text — Playground</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
      .app {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      .app h1 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
      }
      .app p {
        margin: 0 0 1.5rem;
        color: #555;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
        align-items: center;
      }
      .controls button,
      .controls select {
        padding: 0.4rem 0.75rem;
        border: 1px solid #ccc;
        background: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.875rem;
      }
      .controls button:hover {
        background: #f0f0f0;
      }
      .output {
        margin-top: 1.5rem;
        padding: 1rem;
        background: white;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
      }
      .output pre {
        margin: 0;
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
      }
      .pink-theme {
        --rte-accent: hotpink;
        --rte-btn-active-bg: hotpink;
        --rte-image-outline: hotpink;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
